name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --title "Dolphin $GITHUB_REF_NAME" --generate-notes --repo "$GITHUB_REPOSITORY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish (${{ matrix.rid }})
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - rid: linux-x64
            archive_ext: tar.gz
          - rid: linux-arm64
            archive_ext: tar.gz
          - rid: osx-arm64
            archive_ext: tar.gz
          - rid: win-x64
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ matrix.rid }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-${{ matrix.rid }}-
            nuget-${{ runner.os }}-

      - name: Set version
        id: ver
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: dotnet publish src/Dolphin/Dolphin.csproj -r ${{ matrix.rid }} -c Release -o bin/

      - name: Archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: tar -czf dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.tar.gz -C bin .

      - name: Archive (zip)
        if: matrix.archive_ext == 'zip'
        run: cd bin && zip -r ../dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.zip .

      - name: Upload asset
        run: gh release upload "$GITHUB_REF_NAME" "dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.${{ matrix.archive_ext }}" --repo "$GITHUB_REPOSITORY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
