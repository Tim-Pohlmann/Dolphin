# yaml-language-server: $schema=https://json.schemastore.org/semgrep.json
# Dolphin rules - generated by the generate-rules skill
# Run `dolphin check` to execute these rules against your codebase.
# Run the generate-rules skill in Claude Code to add or modify rules.

rules:
  - id: no-console-log
    message: "Remove console.log before committing. Use a structured logger instead."
    languages: [typescript, javascript]
    severity: WARNING
    patterns:
      - pattern: console.log(...)

  - id: no-hardcoded-secret
    message: "Possible hardcoded secret detected. Move to an environment variable."
    languages: [typescript, javascript, python]
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              $KEY = "$VALUE"
          - pattern: |
              $OBJ[$KEY] = "$VALUE"
      - metavariable-regex:
          metavariable: $KEY
          regex: '(?i)(api_key|apikey|secret|password|passwd|token|auth_token|access_token|private_key)'
      - metavariable-regex:
          metavariable: $VALUE
          regex: '.{8,}'

  - id: no-todo-without-ticket
    message: "TODO comment must reference a ticket number, e.g. // TODO [PROJ-123]"
    languages: [typescript, javascript, python, go]
    severity: INFO
    pattern-regex: '(//|#)\s*TODO(?!\s*\[[\w]+-\d+\])'
