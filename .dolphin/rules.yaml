# yaml-language-server: $schema=https://json.schemastore.org/semgrep.json
# Dolphin rules - generated by the generate-rules skill
# Run `dolphin check` to execute these rules against your codebase.
# Run the generate-rules skill in Claude Code to add or modify rules.

rules:
  - id: no-console-log
    message: "Remove console.log/warn/error/info before committing. Use a structured logger instead. In launcher.js, use process.stderr.write() to avoid corrupting the MCP stdio channel."
    languages: [typescript, javascript]
    severity: WARNING
    pattern-either:
      - pattern: console.log(...)
      - pattern: console.warn(...)
      - pattern: console.error(...)
      - pattern: console.info(...)

  - id: no-hardcoded-secret
    message: "Possible hardcoded secret detected. Move to an environment variable."
    languages: [typescript, javascript, python]
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              $KEY = "$VALUE"
          - pattern: |
              $OBJ[$KEY] = "$VALUE"
      - metavariable-regex:
          metavariable: $KEY
          regex: '(?i)(api_key|apikey|secret|password|passwd|token|auth_token|access_token|private_key)'
      - metavariable-regex:
          metavariable: $VALUE
          regex: '.{8,}'

  - id: no-todo-without-ticket
    message: "TODO comment must reference a ticket number, e.g. // TODO [PROJ-123]"
    languages: [typescript, javascript, python, go]
    severity: INFO
    pattern-regex: '(//|#)\s*TODO(?!\s*\[[\w]+-\d+\])'

  - id: string-explicit-comparison-required
    message: "Pass an explicit StringComparison argument (prefer Ordinal or OrdinalIgnoreCase); omitting it produces culture-sensitive behavior that can differ by locale."
    languages: [csharp]
    severity: WARNING
    pattern-either:
      - pattern: $S.EndsWith($ARG)
      - pattern: $S.StartsWith($ARG)

  - id: mcp-lsp-no-stdout-write
    message: "MCP and LSP server code must not call Console.Write/WriteLine; stdout is the JSON-RPC wire - use Console.Error instead."
    languages: [csharp]
    severity: ERROR
    paths:
      include:
        - "src/Dolphin/Mcp/**"
        - "src/Dolphin/Lsp/**"
    pattern-either:
      - pattern: Console.Write(...)
      - pattern: Console.WriteLine(...)
      - pattern: Console.WriteAsync(...)
      - pattern: Console.WriteLineAsync(...)

  - id: env-exit-outside-cli
    message: "Environment.Exit() must only be called from Cli/CheckCommand.cs; throw exceptions in all other code so MCP/LSP callers can handle failures."
    languages: [csharp]
    severity: ERROR
    paths:
      exclude:
        - "src/Dolphin/Cli/CheckCommand.cs"
    pattern: Environment.Exit($CODE)

  - id: lsp-log-must-use-prefix
    message: "LSP log messages must begin with the [dolphin-lsp] prefix so they are identifiable in mixed stderr output."
    languages: [csharp]
    severity: WARNING
    paths:
      include:
        - "src/Dolphin/Lsp/**"
    pattern-regex: 'WriteLineAsync\(["]((?!\[dolphin-lsp\]))[^"]*"'

  - id: launcher-stderr-must-use-prefix
    message: "process.stderr.write() calls in launcher.js must begin with the [dolphin] prefix for traceability."
    languages: [javascript]
    severity: WARNING
    paths:
      include:
        - "launcher/**"
    pattern-regex: 'process\.stderr\.write\(`(?!\[dolphin\])'
