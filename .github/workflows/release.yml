name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.2.3)'
        required: true

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Validate version format
        run: |
          version="${{ github.event.inputs.version }}"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must match v<major>.<minor>.<patch> (got: $version)"
            exit 1
          fi

      - name: Validate version matches repo
        run: |
          repo_version="$(jq -r '.version' .claude-plugin/plugin.json)"
          input_version="${{ github.event.inputs.version }}"
          input_version="${input_version#v}"
          if [[ "$repo_version" != "$input_version" ]]; then
            echo "Error: input version '$input_version' does not match plugin.json version '$repo_version'"
            exit 1
          fi

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.event.inputs.version }}" \
            --title "Dolphin ${{ github.event.inputs.version }}" \
            --target "$(git rev-parse HEAD)" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY" \
          || gh release view "${{ github.event.inputs.version }}" --repo "$GITHUB_REPOSITORY" > /dev/null
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish (${{ matrix.rid }})
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - rid: linux-x64
            archive_ext: tar.gz
          - rid: linux-arm64
            archive_ext: tar.gz
          - rid: osx-x64
            archive_ext: tar.gz
          - rid: osx-arm64
            archive_ext: tar.gz
          - rid: win-x64
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.inputs.version }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Set version
        id: ver
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: echo "value=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: dotnet publish src/Dolphin/Dolphin.csproj -r ${{ matrix.rid }} -c Release -o bin/

      - name: Archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: tar -czf dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.tar.gz -C bin .

      - name: Archive (zip)
        if: matrix.archive_ext == 'zip'
        run: cd bin && zip -r ../dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.zip .

      - name: Upload asset
        run: gh release upload "${{ github.event.inputs.version }}" "dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.${{ matrix.archive_ext }}" --clobber --repo "$GITHUB_REPOSITORY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump-version:
    name: Bump Version
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Bump minor version and commit
        run: |
          semver="${{ github.event.inputs.version }}"
          semver="${semver#v}"
          major="${semver%%.*}"
          minor="${semver#*.}"
          minor="${minor%%.*}"
          next_version="$major.$((minor + 1)).0"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$next_version\"/" .claude-plugin/plugin.json
          sed -i "s|<Version>[^<]*</Version>|<Version>$next_version</Version>|" src/Dolphin/Dolphin.csproj
          csproj_version="$(grep -oPm1 '(?<=<Version>)[^<]+' src/Dolphin/Dolphin.csproj || true)"
          if [ "$csproj_version" != "$next_version" ]; then
            echo "Error: failed to update src/Dolphin/Dolphin.csproj version to $next_version (found: ${csproj_version:-<missing>})"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json src/Dolphin/Dolphin.csproj
          git diff --cached --quiet && { echo "Version already bumped to $next_version"; exit 0; }
          git commit -m "Bump version to $next_version"
          git push origin "${{ github.event.repository.default_branch }}"
