name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.2.3)'
        required: true

jobs:
  create-tag:
    name: Create Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate version format
        run: |
          version="${{ github.event.inputs.version }}"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must match v<major>.<minor>.<patch> (got: $version)"
            exit 1
          fi

      - name: Create and push tag
        run: |
          version="${{ github.event.inputs.version }}"
          head_commit="$(git rev-parse HEAD)"
          remote_tag_commit="$(git ls-remote --refs origin "refs/tags/$version" | awk '{print $1}')"
          remote_peeled_commit="$(git ls-remote origin "refs/tags/$version^{}" | awk '{print $1}')"

          if [[ -n "$remote_peeled_commit" ]]; then
            remote_commit="$remote_peeled_commit"
          else
            remote_commit="$remote_tag_commit"
          fi

          if [[ -n "$remote_commit" ]]; then
            if [[ "$remote_commit" == "$head_commit" ]]; then
              echo "Tag $version already exists on origin and points to $head_commit; nothing to do."
              exit 0
            fi
            echo "Error: tag $version already exists on origin but points to $remote_commit (expected $head_commit)."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$version"
          git push origin "refs/tags/$version"

  create-release:
    name: Create Release
    needs: create-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        run: |
          version="${{ github.event.inputs.version }}"
          if gh release view "$version" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $version already exists; skipping creation."
          else
            gh release create "$version" --title "Dolphin $version" --generate-notes --repo "$GITHUB_REPOSITORY"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish (${{ matrix.rid }})
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - rid: linux-x64
            archive_ext: tar.gz
          - rid: linux-arm64
            archive_ext: tar.gz
          - rid: osx-x64
            archive_ext: tar.gz
          - rid: osx-arm64
            archive_ext: tar.gz
          - rid: win-x64
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ matrix.rid }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-${{ matrix.rid }}-
            nuget-${{ runner.os }}-

      - name: Set version
        id: ver
        run: |
          version="${{ github.event.inputs.version }}"
          echo "value=${version#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: dotnet publish src/Dolphin/Dolphin.csproj -r ${{ matrix.rid }} -c Release -o bin/

      - name: Archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: tar -czf dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.tar.gz -C bin .

      - name: Archive (zip)
        if: matrix.archive_ext == 'zip'
        run: cd bin && zip -r ../dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.zip .

      - name: Upload asset
        run: gh release upload "${{ github.event.inputs.version }}" "dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.${{ matrix.archive_ext }}" --clobber --repo "$GITHUB_REPOSITORY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
