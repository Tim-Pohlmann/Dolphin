name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.2.3)'
        required: true

jobs:
  create-tag:
    name: Create Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ github.event.inputs.version }}"
          git push origin "${{ github.event.inputs.version }}"

  create-release:
    name: Create Release
    needs: create-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        run: gh release create "${{ github.event.inputs.version }}" --title "Dolphin ${{ github.event.inputs.version }}" --generate-notes --repo "$GITHUB_REPOSITORY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish (${{ matrix.rid }})
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - rid: linux-x64
            archive_ext: tar.gz
          - rid: linux-arm64
            archive_ext: tar.gz
          - rid: osx-x64
            archive_ext: tar.gz
          - rid: osx-arm64
            archive_ext: tar.gz
          - rid: win-x64
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ matrix.rid }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-${{ matrix.rid }}-
            nuget-${{ runner.os }}-

      - name: Set version
        id: ver
        run: echo "value=${{ github.event.inputs.version }}" | sed 's/^value=v/value=/' >> "$GITHUB_OUTPUT"

      - name: Publish
        run: dotnet publish src/Dolphin/Dolphin.csproj -r ${{ matrix.rid }} -c Release -o bin/

      - name: Archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: tar -czf dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.tar.gz -C bin .

      - name: Archive (zip)
        if: matrix.archive_ext == 'zip'
        run: cd bin && zip -r ../dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.zip .

      - name: Upload asset
        run: gh release upload "${{ github.event.inputs.version }}" "dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.${{ matrix.archive_ext }}" --repo "$GITHUB_REPOSITORY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
