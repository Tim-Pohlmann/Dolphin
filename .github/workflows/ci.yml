name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarQube blame information

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: true

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install dotnet-sonarscanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        run: dotnet restore Dolphin.slnx

      - name: Begin SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"Tim-Pohlmann_Dolphin" \
            /o:"tim-pohlmann" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="tests/**/coverage.opencover.xml" \
            /d:sonar.javascript.lcov.reportPaths="coverage/lcov.info"

      - name: Build
        run: dotnet build Dolphin.slnx --no-restore -c Release

      - name: Get latest opengrep version
        id: opengrep-version
        run: |
          VERSION=$(curl -fsSL --proto '=https' --tlsv1.2 "https://api.github.com/repos/opengrep/opengrep/releases/latest" | sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p')
          test -n "$VERSION" || { echo "Failed to determine opengrep version" >&2; exit 1; }
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache opengrep
        id: cache-opengrep
        uses: actions/cache@v4
        with:
          path: ~/.cache/opengrep
          key: opengrep-${{ runner.os }}-${{ steps.opengrep-version.outputs.version }}

      - name: Download opengrep
        if: steps.cache-opengrep.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/opengrep
          VERSION="${{ steps.opengrep-version.outputs.version }}"
          curl -fsSL --proto '=https' --tlsv1.2 "https://github.com/opengrep/opengrep/releases/download/${VERSION}/opengrep_manylinux_x86" -o ~/.cache/opengrep/opengrep

      - name: Install opengrep
        run: |
          sudo cp ~/.cache/opengrep/opengrep /usr/local/bin/opengrep
          sudo chmod +x /usr/local/bin/opengrep

      - name: Test (launcher)
        run: npx --yes c8@10 --reporter=lcov --report-dir=coverage node --test launcher/launcher.test.js

      - name: Test (.NET)
        run: dotnet test Dolphin.slnx --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: End SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
