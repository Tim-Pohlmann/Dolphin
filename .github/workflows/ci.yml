name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarQube blame information

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install dotnet-sonarscanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        run: dotnet restore Dolphin.slnx

      - name: Begin SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"Tim-Pohlmann_Dolphin" \
            /o:"tim-pohlmann" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="tests/**/coverage.opencover.xml"

      - name: Build
        run: dotnet build Dolphin.slnx --no-restore -c Release

      - name: Get latest opengrep version
        id: opengrep-version
        run: |
          VERSION=$(curl -fsSL -o /dev/null -w '%{url_effective}' https://github.com/opengrep/opengrep/releases/latest | sed 's|.*/tag/||')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache opengrep
        id: cache-opengrep
        uses: actions/cache@v4
        with:
          path: ~/.cache/opengrep
          key: opengrep-${{ runner.os }}-${{ steps.opengrep-version.outputs.version }}

      - name: Download opengrep
        if: steps.cache-opengrep.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/opengrep
          curl -fsSL https://github.com/opengrep/opengrep/releases/latest/download/opengrep_manylinux_x86 -o ~/.cache/opengrep/opengrep

      - name: Install opengrep
        run: |
          sudo cp ~/.cache/opengrep/opengrep /usr/local/bin/opengrep
          sudo chmod +x /usr/local/bin/opengrep

      - name: Test
        run: dotnet test Dolphin.slnx --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: End SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
