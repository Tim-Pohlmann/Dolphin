name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.2.3)'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  create-tag:
    name: Create Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate dispatch ref
        run: |
          dispatch_ref="${{ github.ref_name }}"
          default_branch="${{ github.event.repository.default_branch }}"
          if [[ "$dispatch_ref" != "$default_branch" ]]; then
            echo "Error: this workflow must be run from the default branch '$default_branch' (got: '$dispatch_ref')."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Validate version format
        run: |
          version="${{ github.event.inputs.version }}"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must match v<major>.<minor>.<patch> (got: $version)"
            exit 1
          fi

      - name: Create and push tag
        run: |
          version="${{ github.event.inputs.version }}"
          head_commit="$(git rev-parse HEAD)"
          remote_tag_commit="$(git ls-remote --refs origin "refs/tags/$version" | awk '{print $1}')"
          remote_peeled_commit="$(git ls-remote origin "refs/tags/$version^{}" | awk '{print $1}')"

          if [[ -n "$remote_peeled_commit" ]]; then
            remote_commit="$remote_peeled_commit"
          else
            remote_commit="$remote_tag_commit"
          fi

          if [[ -n "$remote_commit" ]]; then
            if [[ "$remote_commit" == "$head_commit" ]]; then
              echo "Tag $version already exists on origin and points to $head_commit; nothing to do."
              exit 0
            fi
            echo "Error: tag $version already exists on origin but points to $remote_commit (expected $head_commit)."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$version" -m "Release $version"
          git push origin "refs/tags/$version"

  create-release:
    name: Create Release
    needs: create-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        run: |
          version="${{ github.event.inputs.version }}"
          if gh release view "$version" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $version already exists; skipping creation."
          else
            gh release create "$version" --title "Dolphin $version" --generate-notes --verify-tag --repo "$GITHUB_REPOSITORY"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish (${{ matrix.rid }})
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - rid: linux-x64
            archive_ext: tar.gz
          - rid: linux-arm64
            archive_ext: tar.gz
          - rid: osx-x64
            archive_ext: tar.gz
          - rid: osx-arm64
            archive_ext: tar.gz
          - rid: win-x64
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and checkout release tag
        run: |
          version="${{ github.event.inputs.version }}"
          for attempt in 1 2 3 4 5; do
            if git fetch --force origin "refs/tags/$version:refs/tags/$version" && git checkout "refs/tags/$version"; then
              exit 0
            fi
            echo "Tag $version not available yet (attempt $attempt/5); retrying in 5 seconds..."
            sleep 5
          done
          echo "Failed to fetch and checkout tag $version after 5 attempts."
          exit 1

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ matrix.rid }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-${{ matrix.rid }}-
            nuget-${{ runner.os }}-

      - name: Set version
        id: ver
        run: |
          version="${{ github.event.inputs.version }}"
          echo "value=${version#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: dotnet publish src/Dolphin/Dolphin.csproj -r ${{ matrix.rid }} -c Release -o bin/

      - name: Archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: tar -czf dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.tar.gz -C bin .

      - name: Archive (zip)
        if: matrix.archive_ext == 'zip'
        run: cd bin && zip -r ../dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.zip .

      - name: Upload asset
        run: |
          version="${{ github.event.inputs.version }}"
          asset="dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.${{ matrix.archive_ext }}"
          if gh release view "$version" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | grep -Fxq "$asset"; then
            echo "Asset $asset already exists on release $version; skipping upload."
          else
            gh release upload "$version" "$asset" --repo "$GITHUB_REPOSITORY"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
