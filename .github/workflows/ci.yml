name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            opengrep_asset: opengrep_manylinux_x86
            opengrep_binary: opengrep
          - os: macos-latest
            opengrep_asset: opengrep_osx_arm64
            opengrep_binary: opengrep
          - os: windows-latest
            opengrep_asset: opengrep_windows_x86.exe
            opengrep_binary: opengrep.exe

    steps:
      - uses: actions/checkout@v4

      - name: Get opengrep version
        id: opengrep-version
        shell: bash
        run: |
          VERSION=$(sed -n 's/.*<OpengrepVersion>\([^<]*\)<\/OpengrepVersion>.*/\1/p' src/Dolphin/Dolphin.csproj)
          test -n "$VERSION" || { echo "Failed to read OpengrepVersion from Dolphin.csproj" >&2; exit 1; }
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: true

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Dolphin.slnx

      - name: Build
        run: dotnet build Dolphin.slnx --no-restore -c Release

      - name: Cache opengrep
        id: cache-opengrep
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/opengrep-cache
          key: opengrep-${{ runner.os }}-${{ steps.opengrep-version.outputs.version }}

      - name: Download opengrep (Linux/macOS)
        if: steps.cache-opengrep.outputs.cache-hit != 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p "${{ runner.temp }}/opengrep-cache"
          curl -fsSL --proto '=https' --tlsv1.2 \
            "https://github.com/opengrep/opengrep/releases/download/${{ steps.opengrep-version.outputs.version }}/${{ matrix.opengrep_asset }}" \
            -o "${{ runner.temp }}/opengrep-cache/${{ matrix.opengrep_binary }}"

      - name: Download opengrep (Windows)
        if: steps.cache-opengrep.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ runner.temp }}\opengrep-cache" | Out-Null
          curl.exe -fsSL --proto '=https' --tlsv1.2 `
            "https://github.com/opengrep/opengrep/releases/download/${{ steps.opengrep-version.outputs.version }}/${{ matrix.opengrep_asset }}" `
            -o "${{ runner.temp }}\opengrep-cache\${{ matrix.opengrep_binary }}"

      - name: Install opengrep (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          sudo cp "${{ runner.temp }}/opengrep-cache/${{ matrix.opengrep_binary }}" /usr/local/bin/opengrep
          sudo chmod +x /usr/local/bin/opengrep

      - name: Install opengrep (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\opengrep | Out-Null
          Copy-Item "${{ runner.temp }}\opengrep-cache\${{ matrix.opengrep_binary }}" -Destination "C:\opengrep\opengrep.exe"
          "C:\opengrep" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Test (launcher)
        run: node --test launcher/launcher.test.js

      - name: Test (.NET)
        run: dotnet test Dolphin.slnx --no-build -c Release --verbosity normal

  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarQube blame information

      - name: Get opengrep version
        id: opengrep-version
        shell: bash
        run: |
          VERSION=$(sed -n 's/.*<OpengrepVersion>\([^<]*\)<\/OpengrepVersion>.*/\1/p' src/Dolphin/Dolphin.csproj)
          test -n "$VERSION" || { echo "Failed to read OpengrepVersion from Dolphin.csproj" >&2; exit 1; }
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          check-latest: true

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install dotnet-sonarscanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        run: dotnet restore Dolphin.slnx

      - name: Begin SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"Tim-Pohlmann_Dolphin" \
            /o:"tim-pohlmann" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="tests/**/coverage.opencover.xml" \
            /d:sonar.javascript.lcov.reportPaths="coverage/lcov.info"

      - name: Build
        run: dotnet build Dolphin.slnx --no-restore -c Release

      - name: Cache opengrep
        id: cache-opengrep
        uses: actions/cache@v4
        with:
          path: ~/.cache/opengrep
          key: opengrep-${{ runner.os }}-${{ steps.opengrep-version.outputs.version }}

      - name: Download opengrep
        if: steps.cache-opengrep.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/opengrep
          curl -fsSL --proto '=https' --tlsv1.2 "https://github.com/opengrep/opengrep/releases/download/${{ steps.opengrep-version.outputs.version }}/opengrep_manylinux_x86" -o ~/.cache/opengrep/opengrep

      - name: Install opengrep
        run: |
          sudo cp ~/.cache/opengrep/opengrep /usr/local/bin/opengrep
          sudo chmod +x /usr/local/bin/opengrep

      - name: Test (launcher)
        run: npx --yes c8@10 --reporter=lcov --report-dir=coverage node --test launcher/launcher.test.js

      - name: Test (.NET)
        run: dotnet test Dolphin.slnx --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: End SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
