name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.2.3)'
        required: true

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Validate
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ ! "$INPUT_VERSION" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Error: version must match v<major>.<minor>.<patch> with no leading zeros (got: $INPUT_VERSION)"
            exit 1
          fi
          semver="${INPUT_VERSION#v}"
          plugin_version=$(jq -r '.version' .claude-plugin/plugin.json)
          csproj_version=$(grep -oPm1 '(?<=<Version>)[^<]+' src/Dolphin/Dolphin.csproj)
          if [[ "$plugin_version" != "$semver" || "$csproj_version" != "$semver" ]]; then
            echo "Error: version mismatch. Expected $semver but found plugin.json=$plugin_version, Dolphin.csproj=$csproj_version"
            echo "Bump the version first by running the Version Bump workflow with version $INPUT_VERSION."
            exit 1
          fi

      - name: Create tag and GitHub Release
        run: |
          git fetch --tags origin
          if git rev-parse --verify "refs/tags/${{ github.event.inputs.version }}" >/dev/null 2>&1; then
            commits_after=$(git rev-list "refs/tags/${{ github.event.inputs.version }}..origin/${{ github.event.repository.default_branch }}" --count)
            if [[ "$commits_after" -gt 0 ]]; then
              echo "Error: release ${{ github.event.inputs.version }} already completed ($commits_after commit(s) after tag)." >&2
              exit 1
            fi
            echo "Partial re-run: tag already exists — skipping."
          else
            git tag "${{ github.event.inputs.version }}"
            git push origin "${{ github.event.inputs.version }}"
          fi
          gh release create "${{ github.event.inputs.version }}" \
            --title "Dolphin ${{ github.event.inputs.version }}" \
            --target "$(git rev-parse HEAD)" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY" \
          || gh release view "${{ github.event.inputs.version }}" --repo "$GITHUB_REPOSITORY" > /dev/null
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish (${{ matrix.rid }})
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - rid: linux-x64
            archive_ext: tar.gz
          - rid: linux-arm64
            archive_ext: tar.gz
          - rid: osx-x64
            archive_ext: tar.gz
          - rid: osx-arm64
            archive_ext: tar.gz
          - rid: win-x64
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.inputs.version }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Set version
        id: ver
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: echo "value=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: dotnet publish src/Dolphin/Dolphin.csproj -r ${{ matrix.rid }} -c Release -o bin/

      - name: Archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: tar -czf dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.tar.gz -C bin .

      - name: Archive (zip)
        if: matrix.archive_ext == 'zip'
        run: cd bin && zip -r ../dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.zip .

      - name: Upload asset
        run: gh release upload "${{ github.event.inputs.version }}" "dolphin-${{ steps.ver.outputs.value }}-${{ matrix.rid }}.${{ matrix.archive_ext }}" --clobber --repo "$GITHUB_REPOSITORY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump-version:
    name: Bump Version
    needs: publish
    uses: ./.github/workflows/version-bump.yml
    permissions:
      contents: write
      pull-requests: write
